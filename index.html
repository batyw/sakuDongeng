<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Petualangan Dongeng Nusantara</title>
  
  <!-- Menghubungkan file CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!-- Wadah utama aplikasi game -->
  <main id="app">
    <div class="game">
      <section class="start-overlay">
        <div class="start-card">
          <img src="assets/images/hero_cover.png" alt="Saku Dongeng Nusantara" class="hero-cover-img" />
          <h1 class="hero-title">Petualangan Dongeng Nusantara</h1>
          <p class="subtitle">Baca cerita rakyat, pilih tindakan bijaksana, jawab kuis, dan temukan ending berbeda.</p>
          <div class="action-row">
            <button class="primary" data-action="open-menu">Mulai Bermain</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Menghubungkan file JavaScript -->
  <script src="script.js"></script>
</body>
</html>
